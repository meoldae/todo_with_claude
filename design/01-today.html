<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>오늘 뷰 — 목업</title>
<style>
  /* 60-30-10: Base(white/#F5F8FF) 60% · Navy(#1B3A6B) 30% · Sky(#0EA5E9) 10% */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #dde3ed;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 24px;
  }
  .window {
    width: 1280px; height: 800px; display: flex; border-radius: 10px;
    overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.25);
  }

  /* ── 30% · 네이비 사이드바 ── */
  .sidebar {
    width: 220px; background: #1B3A6B; color: #BAE6FD;
    display: flex; flex-direction: column; flex-shrink: 0; padding: 0 0 16px 0;
  }
  .sidebar-logo {
    padding: 20px 20px 24px; font-size: 17px; font-weight: 700; color: #fff;
    border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label {
    font-size: 11px; font-weight: 600; color: rgba(186,230,253,0.6);
    padding: 12px 20px 4px; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 20px; font-size: 14px; color: #BAE6FD; cursor: pointer;
  }
  .nav-item:hover { background: #254E8F; }
  /* 10% 강조 — 활성 항목 */
  .nav-item.active { background: #0EA5E9; color: #fff; font-weight: 600; }
  .nav-icon { font-size: 16px; width: 18px; text-align: center; }
  .nav-badge {
    margin-left: auto; background: rgba(255,255,255,0.15); color: #fff;
    font-size: 11px; font-weight: 700; border-radius: 10px; padding: 1px 7px;
  }
  .sidebar-spacer { flex: 1; }
  .sidebar-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 8px 16px; }

  /* ── 60% · 베이스 콘텐츠 영역 ── */
  .main { flex: 1; background: #F5F8FF; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    background: #fff; border-bottom: 1px solid #E2E8F0;
    padding: 0 32px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-title { font-size: 20px; font-weight: 700; color: #1E293B; }
  .topbar-sub { font-size: 13px; color: #64748B; margin-left: 10px; }

  /* 10% 강조 — 버튼 */
  .btn-primary {
    padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 600;
    background: #0EA5E9; color: #fff; border: none; cursor: pointer;
  }
  .btn-primary:hover { background: #0284C7; }

  .content { flex: 1; overflow-y: auto; padding: 28px 32px; display: flex; flex-direction: column; gap: 20px; }

  /* 10% 강조 — 프로그레스 */
  .progress-row { display: flex; align-items: center; gap: 10px; }
  .progress-bar { flex: 1; height: 6px; background: #E0F2FE; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: #0EA5E9; border-radius: 3px; }
  .progress-text { font-size: 12px; color: #64748B; white-space: nowrap; }

  .quick-add {
    background: #fff; border: 1.5px dashed #BAE6FD; border-radius: 10px;
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    color: #94A3B8; font-size: 14px; cursor: pointer;
  }
  .quick-add:hover { border-color: #0EA5E9; color: #0EA5E9; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 13px; font-weight: 600; color: #64748B; margin-bottom: 4px;
  }
  .section-count { font-size: 12px; color: #94A3B8; font-weight: 400; }

  /* 60% 베이스 — 카드 */
  .todo-list { display: flex; flex-direction: column; gap: 4px; }
  .todo-item {
    background: #fff; border-radius: 10px; padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    border: 1px solid #E2E8F0; transition: border-color 0.15s;
  }
  .todo-item:hover { border-color: #BAE6FD; }
  .todo-item.completed { background: #F8FAFF; }

  /* 10% 강조 — 체크박스 */
  .checkbox {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid #BAE6FD; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .checkbox.checked { background: #0EA5E9; border-color: #0EA5E9; color: #fff; font-size: 12px; }

  .star { font-size: 16px; cursor: pointer; flex-shrink: 0; }
  .star.active { color: #F59E0B; }
  .star.inactive { color: #CBD5E1; }
  .todo-title { flex: 1; font-size: 14px; color: #1E293B; }
  .todo-item.completed .todo-title { text-decoration: line-through; color: #94A3B8; }

  .badge {
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; white-space: nowrap;
  }
  /* 10% 강조 — 날짜 뱃지 */
  .badge-date { background: #E0F2FE; color: #0369A1; }
  .badge-overdue { background: #FEE2E2; color: #DC2626; }
  .badge-high { background: #FEE2E2; color: #DC2626; }
  .badge-mid { background: #FEF3C7; color: #D97706; }
  .badge-low { background: #E0F2FE; color: #0369A1; }
  .badge-repeat { background: #EEF2FF; color: #6366F1; }

  .collapse-row {
    display: flex; align-items: center; gap: 8px; padding: 8px 4px;
    font-size: 13px; color: #64748B; cursor: pointer;
  }
  .collapse-row:hover { color: #0EA5E9; }

  /* 10% 강조 — Undo 토스트 (accent 색으로 눈에 띄게) */
  .undo-toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1B3A6B; color: #fff; border-radius: 10px;
    padding: 12px 20px; display: flex; align-items: center; gap: 16px;
    font-size: 13px; box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  .undo-btn {
    color: #38BDF8; font-weight: 700; cursor: pointer;
    font-size: 13px; background: none; border: none;
  }
</style>
</head>
<body>
<div class="window">

  <!-- 30% 네이비 사이드바 -->
  <nav class="sidebar">
    <div class="sidebar-logo"><span>✦</span> DoBook</div>
    <div class="section-label">투두</div>
    <div class="nav-item active">
      <span class="nav-icon">☀️</span> 오늘
      <span class="nav-badge">5</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">📋</span> 전체 할 일
      <span class="nav-badge">12</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">📊</span> 통계
    </div>
    <div class="sidebar-divider"></div>
    <div class="section-label">가계부</div>
    <div class="nav-item"><span class="nav-icon">💳</span> 거래 내역</div>
    <div class="nav-item"><span class="nav-icon">📈</span> 예산 현황</div>
    <div class="nav-item"><span class="nav-icon">🧾</span> 연말정산</div>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-divider"></div>
    <div class="nav-item"><span class="nav-icon">⚙️</span> 설정</div>
  </nav>

  <!-- 60% 베이스 영역 -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex; align-items:baseline; gap:8px;">
        <span class="topbar-title">오늘</span>
        <span class="topbar-sub">2026년 5월 18일 월요일</span>
      </div>
      <div style="display:flex; align-items:center; gap:16px;">
        <div class="progress-row">
          <span style="font-size:13px; color:#64748B;">오늘 완료율</span>
          <div class="progress-bar" style="width:120px;">
            <div class="progress-fill" style="width:40%;"></div>
          </div>
          <span class="progress-text">2 / 5</span>
        </div>
        <!-- 10% 강조 버튼 -->
        <button class="btn-primary">+ 할 일 추가</button>
      </div>
    </div>

    <div class="content">
      <div class="quick-add">
        <span style="font-size:18px;">＋</span>
        오늘 할 일을 입력하세요...
      </div>

      <div>
        <div class="section-header">
          미완료 <span class="section-count">3개</span>
        </div>
        <div class="todo-list">
          <div class="todo-item">
            <div class="checkbox"></div>
            <span class="star active">★</span>
            <span class="todo-title">프로젝트 기획서 초안 작성</span>
            <span class="badge badge-overdue">오늘 마감</span>
            <span class="badge badge-high">높음</span>
            <span class="badge" style="background:#F0FDF4;color:#16A34A;">업무</span>
          </div>
          <div class="todo-item">
            <div class="checkbox"></div>
            <span class="star active">★</span>
            <span class="todo-title">병원 예약 확인 전화</span>
            <span class="badge badge-date">오늘</span>
            <span class="badge badge-mid">보통</span>
            <span class="badge" style="background:#FDF4FF;color:#9333EA;">개인</span>
          </div>
          <div class="todo-item">
            <div class="checkbox"></div>
            <span class="star inactive">★</span>
            <span class="todo-title">장보기 (저녁 재료)</span>
            <span class="badge badge-date">오늘</span>
            <span class="badge badge-low">낮음</span>
            <span class="badge badge-repeat">매주 월</span>
          </div>
        </div>
      </div>

      <div>
        <div class="collapse-row">
          <span>▾</span><span>완료됨</span><span class="section-count">2개</span>
        </div>
        <div class="todo-list">
          <div class="todo-item completed">
            <div class="checkbox checked">✓</div>
            <span class="star inactive">★</span>
            <span class="todo-title">아침 운동</span>
            <span class="badge badge-repeat">매일</span>
          </div>
          <div class="todo-item completed">
            <div class="checkbox checked">✓</div>
            <span class="star inactive">★</span>
            <span class="todo-title">이메일 확인 및 회신</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- 10% 강조 — Undo 토스트 -->
<div class="undo-toast">
  <span>✓ "아침 운동" 완료 처리됨</span>
  <button class="undo-btn">되돌리기</button>
  <span style="color:#94A3B8; font-size:12px;">3초 후 사라짐</span>
</div>
</body>
</html>
